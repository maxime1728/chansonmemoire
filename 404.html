<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page introuvable · Chanson Mémoire</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/png" sizes="48x48" href="https://res.cloudinary.com/dcx1tfm47/image/upload/f_auto,q_auto,c_fill,w_48,h_48/v1782682803/Favicon_Chanson_M%C3%A9moire_pftcgs.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --paper:#f8f4f0;--ink:#2e1a28;--plum-deep:#5c2d4a;--plum:#8b4a6e;
  --muted:#7a6070;--candle-deep:#a87b2e;--gold-soft:#e8c97a;--line:#ecdfe6;
}
body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;line-height:1.6;-webkit-font-smoothing:antialiased;}
.hd{border-bottom:1px solid var(--line);padding:14px 18px;}
.hd img{height:32px;width:auto;display:block;}
main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:48px 20px;}
.box{max-width:520px;}
.kick{text-transform:uppercase;letter-spacing:.18em;font-size:.72rem;font-weight:700;color:var(--candle-deep);margin-bottom:14px;}
h1{font-family:Georgia,"Times New Roman",serif;font-weight:500;font-size:clamp(2rem,7vw,2.8rem);color:var(--plum-deep);line-height:1.15;margin-bottom:16px;}
p{color:var(--muted);font-size:1.05rem;margin-bottom:28px;}
.btn{display:inline-flex;align-items:center;justify-content:center;background:var(--plum);color:#fff;text-decoration:none;font-weight:700;font-size:1.02rem;padding:15px 32px;border-radius:14px;box-shadow:0 6px 18px rgba(92,45,74,.18);transition:background .15s,transform .15s;}
@media(hover:hover){.btn:hover{background:var(--plum-deep);transform:translateY(-2px);}}
.links{margin-top:28px;display:flex;gap:22px;justify-content:center;flex-wrap:wrap;}
.links a{color:var(--plum);text-decoration:none;font-size:.92rem;font-weight:600;border-bottom:1.5px solid var(--gold-soft);padding-bottom:2px;transition:color .15s;}
@media(hover:hover){.links a:hover{color:var(--candle-deep);}}
</style>
</head>
<body>
<header class="hd">
  <a href="/" aria-label="Chanson Mémoire · Accueil">
    <img src="https://res.cloudinary.com/dcx1tfm47/image/upload/f_auto,q_auto/v1781659915/Logo_Chanson_M%C3%A9moire_jiq5ce.png" alt="Chanson Mémoire" width="120" height="32">
  </a>
</header>
<main>
  <div class="box">
    <p class="kick">Erreur 404</p>
    <h1>Cette page est introuvable</h1>
    <p>Le lien que tu as suivi n'existe pas ou a été déplacé. Reviens à l'accueil, on t'accompagne pour créer la chanson qui rend hommage à ton être cher.</p>
    <a class="btn" href="/">Retour à l'accueil</a>
    <nav class="links" aria-label="Liens utiles">
      <a href="/#comment">Comment ça marche</a>
      <a href="/#exemples">Exemples</a>
      <a href="/#faq">Questions</a>
    </nav>
  </div>
</main>
</body>
</html>
